<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para ícones -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- CSS externo -->
    <link rel="stylesheet" href="agendar.css">
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <header class="header d-flex justify-content-between align-items-center px-4">
            <div class="logo-left">
                <img src="img/logo.png" alt="Logo Left" >
            </div>
            <div class="logo-right">
                <img src="img/logo-senac.png" alt="Logo Right">
            </div>
        </header>

        <div class="row no-gutters">
            <!-- Sidebar -->
            <nav class="sidebar col-md-3 col-lg-2 custom-sidebar">
                <div class="text-center py-4">
                    <p>Boas-vindas, Júlia! <br> ID: 00000</p>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="agendar.html"><i class="fas fa-calendar-alt me-2"></i>Agendar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#"><i class="fas fa-calendar-check me-2"></i>Meus agendamentos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#"><i class="fas fa-cogs me-2"></i>Serviços</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#"><i class="fas fa-comments me-2"></i>Fale conosco</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#"><i class="fas fa-cog me-2"></i>Configurações</a>
                    </li>
                </ul>
                <div class="text-center mt-auto py-3">
                    <a href="#" class="text-white"><i class="fas fa-power-off"></i> Sair</a>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 col-lg-10 p-4">
                <h1 class="main-title">Agendar</h1>
                <h2 class="subtitle">Escolha um segmento</h2>
                <form id="segment-form" action="servicos.html" method="GET">
                    <div class="segments mt-4">
                        <!-- Primeira coluna de segmentos -->
                        <div class="segment-column">
                            <div class="segment-item">
                                <input type="radio" id="estetica" name="segmento" value="Estética">
                                <label for="estetica" class="segment-box">
                                    <span class="segment-title">Estética</span>
                                </label>
                            </div>
                            <div class="segment-item">
                                <input type="radio" id="penteados" name="segmento" value="Penteados">
                                <label for="penteados" class="segment-box">
                                    <span class="segment-title">Penteados</span>
                                </label>
                            </div>
                            <div class="segment-item">
                                <input type="radio" id="formas" name="segmento" value="Formas e Texturas">
                                <label for="formas" class="segment-box">
                                    <span class="segment-title">Formas e Texturas</span>
                                </label>
                            </div>
                            <div class="segment-item">
                                <input type="radio" id="manicure" name="segmento" value="Manicure e Pedicure">
                                <label for="manicure" class="segment-box">
                                    <span class="segment-title">Manicure e Pedicure</span>
                                </label>
                            </div>
                        </div>

                        <!-- Segunda coluna de segmentos -->
                        <div class="segment-column">
                            <div class="segment-item">
                                <input type="radio" id="podologia" name="segmento" value="Podologia">
                                <label for="podologia" class="segment-box">
                                    <span class="segment-title">Podologia</span>
                                </label>
                            </div>
                            <div class="segment-item">
                                <input type="radio" id="unhasgel" name="segmento" value="Unhas em Gel">
                                <label for="unhasgel" class="segment-box">
                                    <span class="segment-title">Unhas em Gel</span>
                                </label>
                            </div>
                            <div class="segment-item">
                                <input type="radio" id="maquiagem" name="segmento" value="Maquiagem">
                                <label for="maquiagem" class="segment-box">
                                    <span class="segment-title">Maquiagem</span>
                                </label>
                            </div>
                            <div class="segment-item">
                                <input type="radio" id="unhasgel2" name="segmento" value="Unhas em Gel">
                                <label for="unhasgel2" class="segment-box">
                                    <span class="segment-title">Unhas em Gel</span>
                                </label>
                            </div>
                        </div>

                        <!-- Terceira coluna de segmentos -->
                        <div class="segment-column">
                            <div class="segment-item">
                                <input type="radio" id="hastecapilar" name="segmento" value="Haste Capilar">
                                <label for="hastecapilar" class="segment-box">
                                    <span class="segment-title">Haste Capilar</span>
                                </label>
                            </div>
                            <div class="segment-item">
                                <input type="radio" id="outros" name="segmento" value="Outros Serviços">
                                <label for="outros" class="segment-box">
                                    <span class="segment-title">Outros Serviços</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Botão "Próximo" -->
                    <div class="rectangle-container mt-4">
                        <button class="btn btn-primary" type="button" disabled id="next-button" onclick="window.location.href='servicos.html';">
                            Próximo
                        </button>
                    </div>
                </form>
            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript para ativar/desativar o botão "Próximo" -->
    <script>
        // Obtém todos os botões de rádio e o botão "Próximo"
        const radios = document.querySelectorAll('input[name="segmento"]');
        const nextButton = document.getElementById('next-button');

        // Adiciona um evento de mudança para habilitar o botão "Próximo" quando um segmento for selecionado
        radios.forEach(radio => {
            radio.addEventListener('change', () => {
                nextButton.disabled = false;
            });
        });
    </script>
</body>
</html>
