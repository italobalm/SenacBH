<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenacBH</title>
    <link rel="stylesheet" href="login.css"> <!-- Link para o arquivo CSS de estilo -->
</head>
<body>
    <div class="container">
        <!-- Logo do SENAC Beauty Hub -->
        <div class="logo-beauty-hub">
            <img src="imagens/logo senac beauty.png" alt="Senac Beauty Hub Logo">
        </div>

        <!-- Logo do SENAC -->
        <div class="senac-logo">
            <img src="imagens/logo senac.png" alt="Logo Senac">
        </div>

        <!-- Container do login centralizado -->
        <div class="login-container">
            <h1>Acessar minha conta</h1>
            <form>
                <!-- Campo para email ou ID -->
                <div class="input-container">
                    <label for="email">Email ou ID</label>
                    <input type="text" id="email" name="email" placeholder="Email ou ID">
                </div>

                <!-- Campo para senha -->
                <div class="input-container">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Senha">
                </div>

                <!-- Link para recuperação de senha -->
                <div class="forgot-password">
                    <a href="esquecisenha.html">Esqueci minha senha</a>
                </div>

                <!-- Botão de login, redireciona para a página de agendamento -->
                <button type="button" class="login-btn" onclick="window.location.href='agendamento.html'">Entrar</button>

                <!-- Link para cadastro caso o usuário não tenha conta -->
                <div class="register">
                    <a href="cadastro.html">Ainda não possuo conta</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
