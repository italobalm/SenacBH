<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAC Beauty Hub</title>
    <link rel="stylesheet" href="resgatarsenha.css">
</head>
<body>
    <div class="container">
        <!-- Logo do SENAC Beauty Hub -->
        <div class="logo-beauty-hub">
            <img src="imagens/logo senac beauty.png" alt="Senac Beauty Hub Logo">
        </div>

        <!-- Logo do SENAC -->
        <div class="senac-logo">
            <img src="imagens/logo senac.png" alt="Logo Senac">
        </div>
    </div>
<!-- Campo para recuperar senha-->
    <div class="login-container">
        <h1>Esqueci minha senha</h1>
        <form>
            <div class="input-container">
                <label for="email">Digite seu email e enviaremos um link de redefinição</label>
                <input type="text" id="email" name="email" placeholder="Email">
            </div>

            <div class="button-container">
                <!-- Botão de voltar, redireciona para a página de login -->
                <button type="button" class="voltar-btn" onclick="window.location.href='login_funcionario.html'">Voltar</button>
                <!-- Botão de enviar -->
                <button type="submit" class="finalizar-btn">Enviar</button>
            </div>
   
</body>
</html>
